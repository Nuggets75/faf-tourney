name: faf-tourney
services:
  app:
    image: node:20-alpine
    container_name: faf-tourney
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - faf_tourney_data:/data
    environment:
      - DATA_DIR=/data
      - PORT=8090
      # CHANGE THIS to your GitHub repo URL:
      - REPO=https://github.com/Nuggets75/faf-tourney.git
    command: >
      sh -c "apk add --no-cache git >/dev/null 2>&1 &&
             rm -rf /srv/app &&
             git clone --depth 1 $$REPO /srv/app &&
             node /srv/app/server.js"

volumes:
  faf_tourney_data:
